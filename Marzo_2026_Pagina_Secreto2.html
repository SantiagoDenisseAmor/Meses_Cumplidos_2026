<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>En mantenimiento 🛠</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Segoe UI;
background:linear-gradient(270deg,#020111,#0b1c3a,#020111);
background-size:600% 600%;
animation:bgMove 10s infinite alternate;
color:white;
overflow:hidden;
}

/* FONDO */
@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* ESTRELLAS */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
0%{opacity:0.2;}
100%{opacity:1;}
}

/* CAJA */
.box{
text-align:center;
padding:30px;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(10px);
animation:float 3s infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

/* GATITO */
img{
width:200px;
margin-top:20px;
animation:limpiar 2s infinite;
}

@keyframes limpiar{
0%{transform:translateX(0);}
50%{transform:translateX(20px);}
100%{transform:translateX(0);}
}

/* PUNTOS */
.dot{
animation:blink 1.5s infinite;
}
.dot:nth-child(2){animation-delay:0.3s;}
.dot:nth-child(3){animation-delay:0.6s;}

@keyframes blink{
0%,100%{opacity:0;}
50%{opacity:1;}
}
</style>
</head>

<body>

<script>
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*100+"vh";
s.style.left=Math.random()*100+"vw";
document.body.appendChild(s);
}
</script>

<div class="box">
<h1>Hola amor, tendrás que esperar 💕</h1>
<h2>🛠 En mantenimiento</h2>

<p>
Esta parte De Nuestro Universo aún se está construyendo
<span class="dot">.</span>
<span class="dot">.</span>
<span class="dot">.</span>
</p>

<p>Algo bonito viene en camino 💖</p>

<img src="https://i.postimg.cc/W3ntVh1x/Picsart-26-03-28-02-53-23-682.png">

<h3>Michael Preparabdndo</h3>
</div>

</body>
</html>
